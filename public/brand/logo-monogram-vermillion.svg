<!-- 
  IKECHUKWU ALAETO — Monogram (Vermillion badge variant)
  Bone letterforms on vermillion rounded square (squiricle).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="17" fill="#D63A2F"/>
  <g stroke="#F0EDE6" fill="none" stroke-linecap="square" transform="translate(-2, 0)">
    <!-- I: tilted 15° clockwise around (30,50) -->
    <line x1="30" y1="11" x2="30" y2="89" stroke-width="14"
          transform="rotate(15, 30, 50)"/>
    <!-- A: left leg -->
    <line x1="64" y1="10" x2="43" y2="90" stroke-width="13"/>
    <!-- A: right leg -->
    <line x1="64" y1="10" x2="85" y2="90" stroke-width="13"/>
    <!-- A: crossbar -->
    <line x1="51" y1="56" x2="77" y2="56" stroke-width="11"/>
  </g>
</svg>
