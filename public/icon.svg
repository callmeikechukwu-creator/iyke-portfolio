<!-- 
  IKECHUKWU ALAETO — Monogram Pinned Tab Icon (SVG)
  Transparent background with black letterforms for Safari mask-icon.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g stroke="#000000" fill="none" stroke-linecap="square">
    <!-- I: tilted 15° clockwise around (30,50) -->
    <line x1="30" y1="11" x2="30" y2="89" stroke-width="14"
          transform="rotate(15, 30, 50)"/>
    <!-- A: left leg -->
    <line x1="64" y1="10" x2="43" y2="90" stroke-width="13"/>
    <!-- A: right leg -->
    <line x1="64" y1="10" x2="85" y2="90" stroke-width="13"/>
    <!-- A: crossbar -->
    <line x1="51" y1="56" x2="77" y2="56" stroke-width="11"/>
  </g>
</svg>
